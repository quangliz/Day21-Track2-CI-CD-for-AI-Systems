name: MLOps Pipeline

on:
  push:
    branches: [main]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: pytest tests/ -v


  train:
    needs: test
    runs-on: ubuntu-latest

    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: Configure AWS Credentials
        run: |
          mkdir -p ~/.aws

          cat > ~/.aws/credentials <<EOF
          [default]
          aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EOF

          cat > ~/.aws/config <<EOF
          [default]
          region=${{ secrets.AWS_REGION }}
          EOF

      - name: Pull DVC data
        run: dvc pull

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json;print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to S3
        run: |
          python - <<'EOF'
          import boto3

          s3 = boto3.client("s3")

          s3.upload_file(
              "models/model.pkl",
              "${{ secrets.CLOUD_BUCKET }}",
              "models/latest/model.pkl"
          )

          print("Uploaded model")
          EOF


  eval:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Eval Gate
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")

          print("Accuracy:", acc)

          if acc < 0.70:
              raise SystemExit("Accuracy below threshold")

          print("Eval passed")
          EOF


  deploy:
    needs: eval
    runs-on: ubuntu-latest

    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}

          script: |
            sudo systemctl restart mlops-serve

            sleep 5

            curl http://localhost:8000/health
